kind = "web"
previewPath = "/"
title = "Live Site AI"
version = "1.0.0"
id = "artifacts/live-site-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26257

[services.development]
run = "pnpm --filter @workspace/live-site-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/live-site-ai", "run", "build" ]
publicDir = "artifacts/live-site-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26257"
BASE_PATH = "/"
