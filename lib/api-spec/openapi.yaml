            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Supabase access token — `Bearer <jwt>`.
      schema:
        type: string
    SessionCookie:
      name: lsi_impersonation
      in: cookie
      required: false
      description: App-managed admin impersonation cookie.
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
        role:
          type: string
          enum: [user, admin]
        status:
          type: string
          enum: [active, suspended, pending_approval]
        tier:
          type: string
          enum: [free, pro]
        impersonating:
          oneOf:
            - type: object
              required: [targetUserId, targetEmail]
              properties:
                targetUserId:
                  type: string
                targetEmail:
                  type: [string, 'null']
            - type: 'null'
    AdminUserRow:
      type: object
      required: [id, email, firstName, lastName, role, status, tier, createdAt, demoCount, demosCreated, demosCreatedToday, enrichmentsToday, totalEnrichments, lastActivity, lastLoginAt]
      properties:
        id: { type: string }
        email: { type: [string, 'null'] }
        firstName: { type: [string, 'null'] }
        lastName: { type: [string, 'null'] }
        role: { type: string }
        status: { type: string }
        tier: { type: string, enum: [free, pro] }
        createdAt: { type: string, format: date-time }
        demoCount: { type: integer }
        demosCreated: { type: integer }
        demosCreatedToday: { type: integer }
        enrichmentsToday: { type: integer }
        totalEnrichments: { type: integer }
        lastActivity:
          oneOf:
            - { type: string, format: date-time }
            - { type: 'null' }
        lastLoginAt:
          oneOf:
            - { type: string, format: date-time }
            - { type: 'null' }
    AdminUsersList:
      type: object
      required: [page, pageSize, total, items]
      properties:
        page: { type: integer }
        pageSize: { type: integer }
        total: { type: integer }
        items:
          type: array
          items: { $ref: '#/components/schemas/AdminUserRow' }
    AdminDemoRow:
      type: object
      required: [id, companyName, slug, status, viewCount, callClickCount, calendarClickCount, createdAt, userId, ownerEmail]
      properties:
        id: { type: string }
        companyName: { type: string }
        slug: { type: string }
        status: { type: string }
        viewCount: { type: integer }
        callClickCount: { type: integer }
        calendarClickCount: { type: integer }
        createdAt: { type: string, format: date-time }
        userId: { type: string }
        ownerEmail: { type: [string, 'null'] }
    AdminDemosList:
      type: object
      required: [page, pageSize, total, items]
      properties:
        page: { type: integer }
        pageSize: { type: integer }
        total: { type: integer }
        items:
          type: array
          items: { $ref: '#/components/schemas/AdminDemoRow' }
    AdminAuditLogRow:
      type: object
      required: [id, actorId, action, createdAt]
      properties:
        id: { type: string }
        actorId: { type: string }
        actorEmail: { type: [string, 'null'] }
        action: { type: string }
        targetType: { type: [string, 'null'] }
        targetId: { type: [string, 'null'] }
        details: { type: [string, 'null'] }
        createdAt: { type: string, format: date-time }
    AdminAuditLogList:
      type: object
      required: [page, pageSize, total, items]
      properties:
        page: { type: integer }
        pageSize: { type: integer }
        total: { type: integer }
        items:
          type: array
          items: { $ref: '#/components/schemas/AdminAuditLogRow' }
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    InviteSummary:
      type: object
      required: [token, tier, invitedEmail, expiresAt, consumedAt, revokedAt]
      properties:
        token:
          type: string
        tier:
          type: string
          enum: [free, pro]
        invitedEmail:
          type: [string, 'null']
        expiresAt:
          oneOf:
            - { type: string, format: date-time }
            - { type: 'null' }
        consumedAt:
          oneOf:
            - { type: string, format: date-time }
            - { type: 'null' }
        revokedAt:
          oneOf:
            - { type: string, format: date-time }
            - { type: 'null' }
    InviteStatusEnvelope:
      type: object
      required: [invite, status]
      properties:
        invite:
          $ref: '#/components/schemas/InviteSummary'
        status:
          type: string
    FinalizeInviteEnvelope:
      allOf:
        - type: object
          required: [success, invite]
          properties:
            success:
              type: boolean
              const: true
            invite:
              $ref: '#/components/schemas/InviteSummary'
        - $ref: '#/components/schemas/AuthUserEnvelope'
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
        message:
          type: [string, 'null']
    UsageSnapshot:
      type: object
      required: [tier, demosCreated, demoLimit, enrichmentsToday, dailyEnrichmentLimit, status]
      properties:
        tier: { type: string, enum: [free, pro] }
        demosCreated: { type: integer }
        demoLimit:
          oneOf:
            - { type: integer }
            - { type: 'null' }
        enrichmentsToday: { type: integer }
        dailyEnrichmentLimit:
          oneOf:
            - { type: integer }
            - { type: 'null' }
        status:
          type: string
          enum: [active, suspended, pending_approval]
        usageDate: { type: string }
    AdminInviteRow:
      type: object
      required: [id, token, tier, createdAt, createdBy]
      properties:
        id: { type: string }
        token: { type: string }
        tier: { type: string, enum: [free, pro] }
        invitedEmail: { type: [string, 'null'] }
        note: { type: [string, 'null'] }
        createdAt: { type: string, format: date-time }
        expiresAt:
          oneOf:
            - { type: string, format: date-time }
            - { type: 'null' }
        consumedAt:
          oneOf:
            - { type: string, format: date-time }
            - { type: 'null' }
        consumedByUserId: { type: [string, 'null'] }
        revokedAt:
          oneOf:
            - { type: string, format: date-time }
            - { type: 'null' }
        createdBy: { type: string }
    AdminInvitesList:
      type: object
      required: [page, pageSize, total, items]
      properties:
        page: { type: integer }
        pageSize: { type: integer }
        total: { type: integer }
        items:
          type: array
          items: { $ref: '#/components/schemas/AdminInviteRow' }
    CreateInviteBody:
      type: object
      required: [tier]
      properties:
        tier: { type: string, enum: [free, pro] }
        invitedEmail: { type: [string, 'null'] }
        expiresInDays: { type: [integer, 'null'] }
        note: { type: [string, 'null'] }
    CreateInviteResponse:
      type: object
      required: [invite]
      properties:
        invite: { $ref: '#/components/schemas/AdminInviteRow' }
    ManualUserUpsertBody:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }
        tier: { type: string, enum: [free, pro] }
        role: { type: string, enum: [user, admin] }
        firstName: { type: [string, 'null'] }
        lastName: { type: [string, 'null'] }
    ManualUserUpsertResponse:
      type: object
      required: [user, created]
      properties:
        user: { $ref: '#/components/schemas/AdminUserRow' }
        created: { type: boolean }
    SetTierBody:
      type: object
      required: [tier]
      properties:
        tier: { type: string, enum: [free, pro] }
    SetRoleBody:
      type: object
      required: [role]
      properties:
        role: { type: string, enum: [user, admin] }
    SuccessEnvelope:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    AutomationHealthStatus:
      type: object
      required: [status, service, version]
      properties:
        status: { type: string }
        service: { type: string }
        version: { type: string }

    ApiKeySummary:
      type: object
      required: [id, name, keyPrefix, last4, maskedKey, createdAt]
      properties:
        id: { type: string }
        name: { type: string }
        keyPrefix: { type: string }
        last4: { type: string }
        maskedKey: { type: string }
        lastUsedAt:
          oneOf:
            - { type: string, format: date-time }
            - { type: 'null' }
        revokedAt:
          oneOf:
            - { type: string, format: date-time }
            - { type: 'null' }
        createdAt: { type: string, format: date-time }

    ApiKeysList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/ApiKeySummary' }

    ApiKeyResponse:
      type: object
      required: [apiKey]
      properties:
        apiKey: { $ref: '#/components/schemas/ApiKeySummary' }

    CreateApiKeyBody:
      type: object
      properties:
        name: { type: string }

    CreateApiKeyResponse:
      allOf:
        - $ref: '#/components/schemas/ApiKeyResponse'
        - type: object
          required: [plaintextKey]
          properties:
            plaintextKey: { type: string }

    DemoRequest:
      type: object
      required: [id, source, userId, locationId, companyName, websiteUrl, status, retryCount, createdAt, updatedAt]
      properties:
        id: { type: string }
        source: { type: string }
        userId: { type: string }
        ghlConnectionId: { type: [string, 'null'] }
        locationId: { type: string }
        contactId: { type: [string, 'null'] }
        opportunityId: { type: [string, 'null'] }
        companyName: { type: string }
        websiteUrl: { type: string }
        contactName: { type: [string, 'null'] }
        email: { type: [string, 'null'] }
        phone: { type: [string, 'null'] }
        industry: { type: [string, 'null'] }
        notes: { type: [string, 'null'] }
        rawPayload: {}
        status: { type: string }
        demoId: { type: [string, 'null'] }
        publicUrl: { type: [string, 'null'] }
        errorMessage: { type: [string, 'null'] }
        retryCount: { type: integer }
        lastAttemptAt:
          oneOf:
            - { type: string, format: date-time }
            - { type: 'null' }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    DemoRequestsList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/DemoRequest' }

    CreateDemoRequestBody:
      type: object
      required: [websiteUrl, locationId]
      properties:
        companyName: { type: [string, 'null'] }
        prospectName: { type: [string, 'null'] }
        websiteUrl: { type: string }
        locationId: { type: string }
        contactId: { type: [string, 'null'] }
        opportunityId: { type: [string, 'null'] }
        contactName: { type: [string, 'null'] }
        email: { type: [string, 'null'] }
        phone: { type: [string, 'null'] }
        industry: { type: [string, 'null'] }
        notes: { type: [string, 'null'] }
        rawPayload: {}
        source: { type: [string, 'null'] }
        options:
          type: object
          properties:
            enrich: { type: boolean }

    CreateDemoRequestResponse:
      type: object
      required: [success, demoId, demoUrl, demoRequest, demo, publicUrl]
      properties:
        success: { type: boolean }
        demoId: { type: string }
        demoUrl: { type: string }
        demoRequest: { $ref: '#/components/schemas/DemoRequest' }
        demo: { $ref: '#/components/schemas/Demo' }
        publicUrl: { type: string }

    GhlConnectionSummary:
      type: object
      required: [id, userId, locationId, name, authType, scopes, defaultWritebackMode, addNote, applyTag, createdAt, updatedAt]
      properties:
        id: { type: string }
        userId: { type: string }
        locationId: { type: string }
        companyId: { type: [string, 'null'] }
        name: { type: string }
        authType: { type: string }
        tokenLast4: { type: [string, 'null'] }
        tokenMasked: { type: [string, 'null'] }
        tokenExpiresAt:
          oneOf:
            - { type: string, format: date-time }
            - { type: 'null' }
        scopes:
          type: array
          items: { type: string }
        defaultWritebackMode: { type: string }
        contactDemoUrlFieldId: { type: [string, 'null'] }
        opportunityDemoUrlFieldId: { type: [string, 'null'] }
        addNote: { type: boolean }
        applyTag: { type: boolean }
        successTagId: { type: [string, 'null'] }
        successTagName: { type: [string, 'null'] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    GhlConnectionsList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/GhlConnectionSummary' }

    GhlConnectionResponse:
      type: object
      required: [connection]
      properties:
        connection: { $ref: '#/components/schemas/GhlConnectionSummary' }

    DeleteGhlConnectionResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          required: [connection]
          properties:
            connection: { $ref: '#/components/schemas/GhlConnectionSummary' }

    CreateGhlConnectionBody:
      type: object
      required: [name, locationId, privateIntegrationToken]
      properties:
        name: { type: string }
        locationId: { type: string }
        companyId: { type: [string, 'null'] }
        privateIntegrationToken: { type: string }
        authType:
          type: string
          enum: [private_integration_token]
        scopes:
          type: array
          items: { type: string }
        defaultWritebackMode: { type: [string, 'null'] }
        contactDemoUrlFieldId: { type: [string, 'null'] }
        opportunityDemoUrlFieldId: { type: [string, 'null'] }
        addNote: { type: boolean }
        applyTag: { type: boolean }
        successTagId: { type: [string, 'null'] }
        successTagName: { type: [string, 'null'] }

    GhlWritebackAttempt:
      type: object
      required: [id, demoRequestId, targetType, status, attemptedAt, createdAt]
      properties:
        id: { type: string }
        demoRequestId: { type: string }
        demoId: { type: [string, 'null'] }
        ghlConnectionId: { type: [string, 'null'] }
        targetType: { type: string }
        targetId: { type: [string, 'null'] }
        fieldId: { type: [string, 'null'] }
        status: { type: string, enum: [pending, success, failed] }
        requestMetadata: {}
        responseMetadata: {}
        errorMessage: { type: [string, 'null'] }
        attemptedAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }

    GhlWritebackAttemptsList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/GhlWritebackAttempt' }

    GhlWritebackResponse:
      type: object
      required: [writeback]
      properties:
        writeback: { $ref: '#/components/schemas/GhlWritebackAttempt' }

    CreateWritebackBody:
      type: object
      required: [demoRequestId, targetType]
      properties:
        demoRequestId: { type: string }
        demoId: { type: [string, 'null'] }
        ghlConnectionId: { type: [string, 'null'] }
        targetType: { type: string }
        targetId: { type: [string, 'null'] }
        fieldId: { type: [string, 'null'] }
        status:
          type: string
          enum: [pending, success, failed]
        requestMetadata: {}
        responseMetadata: {}
        errorMessage: { type: [string, 'null'] }

    Demo:
      type: object
      required:
        - id
        - userId
        - companyName
        - slug
        - websiteUrl
        - status
        - viewCount
        - callClickCount
        - calendarClickCount
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        userId:
          type: string
        createdVia:
          type: [string, 'null']
        externalSource:
          type: [string, 'null']
        apiKeyId:
          type: [string, 'null']
        externalSourceId:
          type: [string, 'null']
        locationId:
          type: [string, 'null']
        companyName:
          type: string
        slug:
          type: string
        websiteUrl:
          type: string
        industry:
          type: [string, 'null']
        contactName:
          type: [string, 'null']
        contactEmail:
          type: [string, 'null']
        contactPhone:
          type: [string, 'null']
        voiceAiPhoneNumber:
          type: [string, 'null']
        voicePersonaName:
          type: [string, 'null']
        voiceAiGoal:
          type: [string, 'null']
        desiredTone:
          type: [string, 'null']
        primaryCta:
          type: [string, 'null']
        optionalNotes:
          type: [string, 'null']
        ghlVoiceAgentId:
          type: [string, 'null']
        ctaCalendarLink:
          type: [string, 'null']
        chatWidgetId:
          type: [string, 'null']
        chatPersonaName:
          type: [string, 'null']
