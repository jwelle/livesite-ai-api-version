openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Live Site AI API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: demos
    description: Demo management
  - name: settings
    description: Agency settings
  - name: automation
    description: API key and external automation endpoints
  - name: public
    description: Public demo pages (unauthenticated)
  - name: admin
    description: Admin-only endpoints
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Legacy login endpoint
      responses:
        '410':
          description: Browser login now happens client-side via Supabase Auth.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Legacy callback endpoint
      responses:
        '410':
          description: Legacy callback has been replaced by client-side Supabase Auth.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear server-side impersonation state and redirect home
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect home after clearing impersonation cookies.
    post:
      tags: [Auth]
      operationId: logoutBrowserSessionPost
      summary: Clear server-side impersonation state
      responses:
        '200':
          description: Logout cleanup processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'
  /auth/invite-status:
    get:
      tags: [Auth]
      operationId: getInviteStatus
      summary: Resolve invite token validity and metadata
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Invite token resolved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteStatusEnvelope'
  /auth/finalize-invite:
    post:
      tags: [Auth]
      operationId: finalizeInvite
      summary: Redeem an invite token for the authenticated user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [inviteToken]
              properties:
                inviteToken:
                  type: string
      responses:
        '200':
          description: Invite redeemed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinalizeInviteEnvelope'
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Legacy mobile auth endpoint
      responses:
        '410':
          description: Mobile token exchange has been removed.
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

  /demos:
    get:
      tags: [demos]
      operationId: getDemos
      summary: List all demos for the authenticated user
      responses:
        '200':
          description: List of demos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Demo'
        '401':
          description: Unauthorized
    post:
      tags: [demos]
      operationId: createDemo
      summary: Create a new demo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDemoBody'
      responses:
        '201':
          description: Created demo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Demo'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthorized

  /demos/{id}:
    get:
      tags: [demos]
      operationId: getDemo
      summary: Get a single demo by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Demo found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Demo'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthorized
    patch:
      tags: [demos]
      operationId: updateDemo
      summary: Update a demo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDemoBody'
      responses:
        '200':
          description: Updated demo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Demo'
        '404':
          description: Not found
        '401':
          description: Unauthorized
    delete:
      tags: [demos]
      operationId: deleteDemo
      summary: Delete a demo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '404':
          description: Not found
        '401':
          description: Unauthorized

  /demos/{id}/regenerate-slug:
    post:
      tags: [demos]
      operationId: regenerateDemoSlug
      summary: Regenerate the demo's public URL slug
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: New slug generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Demo'
        '404':
          description: Not found
        '401':
          description: Unauthorized

  /enrich-business:
    post:
      tags: [demos]
      operationId: enrichBusiness
      summary: Run OpenAI web-search enrichment for a business (no save)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnrichBusinessBody'
      responses:
        '200':
          description: Enrichment result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnrichmentResult'
        '400': { description: Validation error, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorEnvelope' } } } }
        '401': { description: Unauthorized }
        '429': { description: Rate limited, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorEnvelope' } } } }
        '500': { description: Enrichment failed, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorEnvelope' } } } }

  /demos/{id}/enrich:
    post:
      tags: [demos]
      operationId: enrichDemo
      summary: Run enrichment and persist to a demo
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: Updated demo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Demo'
        '400': { description: Validation error }
        '401': { description: Unauthorized }
        '404': { description: Not found }
        '429': { description: Rate limited }
        '500': { description: Enrichment failed }

  /demos/{id}/regenerate:
    post:
      tags: [demos]
      operationId: regenerateDemoPrompt
      summary: Regenerate the AI prompt for a demo
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                mode:
                  type: string
                  enum: [replace, separate]
                  description: |
                    "replace" updates aiGeneratedPrompt, currentWorkingPrompt, and the structured profile/package on the demo.
                    "separate" runs a fresh OpenAI generation but only records a new prompt_versions row, leaving the demo's
                    current AI prompt and working prompt untouched. Defaults to "replace".
      responses:
        '200':
          description: Updated demo (new aiGeneratedPrompt; currentWorkingPrompt unchanged)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Demo'
        '404': { description: Not found }
        '401': { description: Unauthorized }
        '429': { description: Rate limited }
        '500': { description: Regenerate failed }

  /demos/{id}/copy-event:
    post:
      tags: [demos]
      operationId: logDemoCopyEvent
      summary: Record that the user copied the working prompt
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: Logged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Demo'
        '404': { description: Not found }
        '401': { description: Unauthorized }

  /demos/{id}/export-markdown:
    post:
      tags: [demos]
      operationId: exportDemoMarkdown
      summary: Export the current working prompt as Markdown
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: Markdown text
          content:
            text/markdown:
              schema: { type: string }
        '404': { description: Not found }
        '401': { description: Unauthorized }

  /demos/{id}/export-json:
    post:
      tags: [demos]
      operationId: exportDemoJson
      summary: Export the business profile and prompts as JSON
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: JSON export
          content:
            application/json:
              schema: { type: object }
        '404': { description: Not found }
        '401': { description: Unauthorized }

  /demos/{id}/prompt-versions:
    get:
      tags: [demos]
      operationId: getDemoPromptVersions
      summary: List saved prompt versions for a demo (newest first)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: List of prompt versions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PromptVersion'
        '404': { description: Not found }
        '401': { description: Unauthorized }

  /demos/{id}/push-ghl:
    post:
      tags: [demos]
      operationId: pushDemoToGhl
      summary: Placeholder GHL push
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: Push result (placeholder)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PushGhlResult'
        '404': { description: Not found }
        '401': { description: Unauthorized }

  /openai-status:
    get:
      tags: [settings]
      operationId: getOpenAIStatus
      summary: Whether the server has an OpenAI key configured
      responses:
        '200':
          description: Status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenAIStatus'

  /dashboard/stats:
    get:
      tags: [demos]
      operationId: getDashboardStats
      summary: Get aggregated dashboard metrics
      responses:
        '200':
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardStats'
        '401':
          description: Unauthorized

  /settings:
    get:
      tags: [settings]
      operationId: getSettings
      summary: Get agency settings for the authenticated user
      responses:
        '200':
          description: Agency settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgencySettings'
        '401':
          description: Unauthorized
    patch:
      tags: [settings]
      operationId: updateSettings
      summary: Update agency settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSettingsBody'
      responses:
        '200':
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgencySettings'
        '401':
          description: Unauthorized

  /me/usage:
    get:
      tags: [Auth]
      operationId: getMyUsage
      summary: Current user's quota / usage snapshot
      responses:
        '200':
          description: Usage snapshot for the authenticated user
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UsageSnapshot' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '403':
          description: Account not active (pending approval or suspended)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /v1/health:
    get:
      tags: [automation]
      operationId: getAutomationHealth
      summary: Automation API health
      responses:
        '200':
          description: Automation API status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AutomationHealthStatus' }
  /v1/api-keys:
    get:
      tags: [automation]
      operationId: listApiKeys
      summary: List API keys for the authenticated user
      responses:
        '200':
          description: API keys
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiKeysList' }
        '401': { description: Unauthorized }
    post:
      tags: [automation]
      operationId: createApiKey
      summary: Create an API key for the authenticated user
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateApiKeyBody' }
      responses:
        '201':
          description: API key created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CreateApiKeyResponse' }
        '400': { description: Validation error }
        '401': { description: Unauthorized }
  /v1/api-keys/{id}/revoke:
    post:
      tags: [automation]
      operationId: revokeApiKey
      summary: Revoke an API key for the authenticated user
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: API key revoked
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiKeyResponse' }
        '401': { description: Unauthorized }
        '404': { description: Not found }
  /v1/demo-requests:
    get:
      tags: [automation]
      operationId: listDemoRequests
      summary: List automation demo requests for the authenticated user
      responses:
        '200':
          description: Demo requests
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DemoRequestsList' }
        '401': { description: Unauthorized }
    post:
      tags: [automation]
      operationId: createDemoRequest
      summary: Create a demo request using an API key
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateDemoRequestBody' }
      responses:
        '201':
          description: Demo request created and demo provisioned
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CreateDemoRequestResponse' }
        '400': { description: Validation error }
        '401': { description: Missing or invalid API key }
        '500': { description: Demo request processing failed }
  /v1/demo-requests/{id}:
    get:
      tags: [automation]
      operationId: getDemoRequest
      summary: Get one automation demo request for the authenticated user
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: Demo request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DemoRequest' }
        '401': { description: Unauthorized }
        '404': { description: Not found }
  /v1/ghl-connections:
    get:
      tags: [automation]
      operationId: listGhlConnections
      summary: List GHL connections for the authenticated user
      responses:
        '200':
          description: GHL connections
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GhlConnectionsList' }
        '401': { description: Unauthorized }
    post:
      tags: [automation]
      operationId: createGhlConnection
      summary: Create a GHL connection for the authenticated user
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateGhlConnectionBody' }
      responses:
        '201':
          description: GHL connection created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GhlConnectionResponse' }
        '400': { description: Validation error }
        '401': { description: Unauthorized }
  /v1/ghl-connections/{id}:
    delete:
      tags: [automation]
      operationId: deleteGhlConnection
      summary: Delete a GHL connection for the authenticated user
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: GHL connection deleted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DeleteGhlConnectionResponse' }
        '401': { description: Unauthorized }
        '404': { description: Not found }
  /v1/writebacks:
    get:
      tags: [automation]
      operationId: listWritebacks
      summary: List writeback attempts for the authenticated user
      parameters:
        - { name: demoRequestId, in: query, required: false, schema: { type: string } }
      responses:
        '200':
          description: Writeback attempts
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GhlWritebackAttemptsList' }
        '401': { description: Unauthorized }
    post:
      tags: [automation]
      operationId: createWriteback
      summary: Create a writeback attempt record for the authenticated user
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateWritebackBody' }
      responses:
        '201':
          description: Writeback attempt created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GhlWritebackResponse' }
        '400': { description: Validation error }
        '401': { description: Unauthorized }
        '404': { description: Referenced resource not found }
  /admin/users:
    get:
      tags: [admin]
      operationId: getAdminUsers
      summary: List all users (admin)
      parameters:
        - { name: page, in: query, required: false, schema: { type: integer } }
        - { name: pageSize, in: query, required: false, schema: { type: integer } }
        - { name: search, in: query, required: false, schema: { type: string } }
        - { name: status, in: query, required: false, schema: { type: string, enum: [pending_approval, active, suspended] } }
      responses:
        '200':
          description: Paginated list of users
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminUsersList' }
        '403': { description: Forbidden }
    post:
      tags: [admin]
      operationId: manualCreateUser
      summary: Manually create or upsert a user by email (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ManualUserUpsertBody' }
      responses:
        '200':
          description: Existing user updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ManualUserUpsertResponse' }
        '201':
          description: New user created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ManualUserUpsertResponse' }
  /admin/users/{id}/approve:
    post:
      tags: [admin]
      operationId: approveUser
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: User approved
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessEnvelope' }
  /admin/users/{id}/reject:
    post:
      tags: [admin]
      operationId: rejectUser
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: User rejected (suspended)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessEnvelope' }
  /admin/users/{id}/set-tier:
    post:
      tags: [admin]
      operationId: setUserTier
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SetTierBody' }
      responses:
        '200':
          description: Tier updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessEnvelope' }
  /admin/users/{id}/set-role:
    post:
      tags: [admin]
      operationId: setUserRole
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SetRoleBody' }
      responses:
        '200':
          description: Role updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessEnvelope' }
  /admin/users/{userId}/api-keys:
    get:
      tags: [admin]
      operationId: adminListUserApiKeys
      summary: List API keys for a target user (admin)
      parameters:
        - { name: userId, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: API keys for the target user
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiKeysList' }
        '404': { description: User not found }
    post:
      tags: [admin]
      operationId: adminCreateUserApiKey
      summary: Create an API key for a target user (admin)
      parameters:
        - { name: userId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateApiKeyBody' }
      responses:
        '201':
          description: API key created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CreateApiKeyResponse' }
        '400': { description: Validation error }
        '404': { description: User not found }
  /admin/users/{userId}/api-keys/{id}/revoke:
    post:
      tags: [admin]
      operationId: adminRevokeUserApiKey
      summary: Revoke an API key for a target user (admin)
      parameters:
        - { name: userId, in: path, required: true, schema: { type: string } }
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: API key revoked
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiKeyResponse' }
        '404': { description: User or API key not found }
  /admin/users/{userId}/ghl-connections:
    get:
      tags: [admin]
      operationId: adminListUserGhlConnections
      summary: List GHL connections for a target user (admin)
      parameters:
        - { name: userId, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: GHL connections for the target user
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GhlConnectionsList' }
        '404': { description: User not found }
    post:
      tags: [admin]
      operationId: adminCreateUserGhlConnection
      summary: Create a GHL connection for a target user (admin)
      parameters:
        - { name: userId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateGhlConnectionBody' }
      responses:
        '201':
          description: GHL connection created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GhlConnectionResponse' }
        '400': { description: Validation error }
        '404': { description: User not found }
  /admin/users/{userId}/ghl-connections/{id}:
    delete:
      tags: [admin]
      operationId: adminDeleteUserGhlConnection
      summary: Delete a GHL connection for a target user (admin)
      parameters:
        - { name: userId, in: path, required: true, schema: { type: string } }
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: GHL connection deleted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DeleteGhlConnectionResponse' }
        '404': { description: User or connection not found }
  /admin/users/{userId}/writebacks:
    get:
      tags: [admin]
      operationId: adminListUserWritebacks
      summary: List writeback attempts for a target user (admin)
      parameters:
        - { name: userId, in: path, required: true, schema: { type: string } }
        - { name: demoRequestId, in: query, required: false, schema: { type: string } }
      responses:
        '200':
          description: Writeback attempts for the target user
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GhlWritebackAttemptsList' }
        '404': { description: User not found }
  /admin/invites:
    get:
      tags: [admin]
      operationId: listInvites
      parameters:
        - { name: page, in: query, required: false, schema: { type: integer } }
        - { name: pageSize, in: query, required: false, schema: { type: integer } }
      responses:
        '200':
          description: Paginated invites
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminInvitesList' }
    post:
      tags: [admin]
      operationId: createInvite
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateInviteBody' }
      responses:
        '201':
          description: Invite created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CreateInviteResponse' }
  /admin/invites/{id}/revoke:
    post:
      tags: [admin]
      operationId: revokeInvite
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: Invite revoked
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessEnvelope' }
  /admin/demos:
    get:
      tags: [admin]
      operationId: getAdminDemos
      summary: List all demos across all users (admin)
      parameters:
        - { name: page, in: query, required: false, schema: { type: integer } }
        - { name: pageSize, in: query, required: false, schema: { type: integer } }
        - { name: search, in: query, required: false, schema: { type: string } }
      responses:
        '200':
          description: Paginated list of demos
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminDemosList' }
        '403': { description: Forbidden }
  /admin/users/{id}/suspend:
    post:
      tags: [admin]
      operationId: suspendUser
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: User suspended
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessEnvelope' }
  /admin/users/{id}/reactivate:
    post:
      tags: [admin]
      operationId: reactivateUser
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: User reactivated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessEnvelope' }
  /admin/audit-log:
    get:
      tags: [admin]
      operationId: getAdminAuditLog
      parameters:
        - { name: page, in: query, required: false, schema: { type: integer } }
        - { name: pageSize, in: query, required: false, schema: { type: integer } }
      responses:
        '200':
          description: Paginated audit log
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminAuditLogList' }
  /admin/impersonate/{userId}:
    post:
      tags: [admin]
      operationId: startImpersonation
      parameters:
        - { name: userId, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: Impersonation started
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessEnvelope' }
  /admin/impersonate/exit:
    post:
      tags: [admin]
      operationId: exitImpersonation
      responses:
        '200':
          description: Impersonation ended
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessEnvelope' }

  /public/demo/{slug}:
    get:
      tags: [public]
      operationId: getPublicDemo
      summary: Get public demo data by slug (unauthenticated)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Public demo data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicDemo'
        '404':
          description: Demo not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /public/demo/{slug}/view:
    post:
      tags: [public]
      operationId: trackDemoView
