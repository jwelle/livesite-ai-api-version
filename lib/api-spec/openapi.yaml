              schema:
                $ref: '#/components/schemas/SuccessEnvelope'

  /public/demo/{slug}/call-click:
    post:
      tags: [public]
      operationId: trackDemoCallClick
      summary: Track a call button click
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Tracked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'

  /public/demo/{slug}/calendar-click:
    post:
      tags: [public]
      operationId: trackDemoCalendarClick
      summary: Track a calendar/book-call click
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Tracked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'

  /public/demo/{slug}/website-open-click:
    post:
      tags: [public]
      operationId: trackDemoWebsiteOpenClick
      summary: Track an open-website button click
      parameters:
        - name: slug
          in: path
          required: true
